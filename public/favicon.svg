<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#50ff30"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feFlood flood-color="#39FF14" flood-opacity="0.35"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0b"/>

  <g filter="url(#glow)">
    <!-- Snake body forming M -->
    <path d="
      M 68,415
      Q 54,420 52,405
      L 52,145
      Q 52,118 76,118
      Q 100,118 106,145
      L 196,340
      Q 206,365 224,365
      Q 242,365 248,340
      L 248,220
      Q 248,195 268,195
      Q 288,195 292,220
      L 292,340
      Q 298,365 316,365
      Q 334,365 340,340
      L 420,155
      Q 426,132 448,132
      Q 465,132 465,155
      L 465,250
    "
    fill="none"
    stroke="url(#g1)"
    stroke-width="46"
    stroke-linecap="round"
    stroke-linejoin="round"
    />

    <!-- Snake head - larger, more angular/menacing -->
    <path d="
      M 443,250
      L 465,242
      L 505,200
      L 505,260
      L 465,282
      L 443,274
      Z
    " fill="#39FF14"/>

    <!-- Brow ridge for menacing look -->
    <path d="
      M 465,242
      L 505,200
      L 505,230
      L 475,248
      Z
    " fill="#2ad810" opacity="0.5"/>

    <!-- Eye - vertical slit -->
    <ellipse cx="484" cy="240" rx="8" ry="12" fill="#0a0a0b"/>
    <ellipse cx="486" cy="240" rx="3" ry="9" fill="#39FF14" opacity="0.35"/>

    <!-- Forked tongue -->
    <line x1="505" y1="232" x2="532" y2="218" stroke="#ff2244" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="505" y1="232" x2="530" y2="244" stroke="#ff2244" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Tail curl -->
    <path d="
      M 68,415
      Q 50,430 36,422
      Q 22,412 30,396
    "
    fill="none"
    stroke="#39FF14"
    stroke-width="20"
    stroke-linecap="round"
    opacity="0.5"
    />
    <path d="
      M 30,396
      Q 34,386 42,385
    "
    fill="none"
    stroke="#39FF14"
    stroke-width="9"
    stroke-linecap="round"
    opacity="0.2"
    />
  </g>
</svg>
